services:
  backend:
    build: ./backend
    container_name: apagones_backend
    restart: unless-stopped
    environment:
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-0}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8098,http://127.0.0.1:8098,http://192.168.68.103:8098,https://mapaapagones.es,https://www.mapaapagones.es}
      DEBUG_ENDPOINTS: ${DEBUG_ENDPOINTS:-0}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,sys,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3); data=json.loads(r.read().decode()); sys.exit(0 if r.status == 200 and data.get('ok') is True else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build: ./frontend
    container_name: apagones_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8098:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
